<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LTX Network Mapper</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div id="side-menu">
        <h2 class="menu-title">Network Config</h2>
        <button id="map-btn">MAP</button>
        <button id="download-btn">Download PNG</button>
        <hr>
        
        <div class="config-card">
            <div class="card-header">
                <strong>LTX Home</strong>
                <input type="checkbox" id="active-Home" checked>
            </div>
            <label>Sensors:</label>
            <input type="number" id="count-Home" value="0">
            <label>Link Type:</label>
            <select id="link-Home">
                <option value="Cellular">Cellular</option>
                <option value="Ethernet">Ethernet</option>
            </select>
        </div>

        <div class="config-card">
            <div class="card-header">
                <strong>LTX 2</strong>
                <input type="checkbox" id="active-2" checked>
            </div>
            <label>Sensors:</label>
            <input type="number" id="count-2" value="6">
            <label>Link Type:</label>
            <select id="link-2">
                <option value="LoRa to Home">LoRa to Home</option>
                <option value="Wired">Wired</option>
            </select>
        </div>
    </div>

    <canvas id="networkCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
